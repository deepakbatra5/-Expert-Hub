name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      EXPERT_HUB_API_URL: ${{ secrets.EXPERT_HUB_API_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write runtime API config
        run: |
          if [ -n "$EXPERT_HUB_API_URL" ]; then
            cat > frontend/config.js << 'EOF'
// Runtime config generated by GitHub Actions.
window.EXPERT_HUB_API_URL = "__API_URL__";
EOF
            sed -i "s|__API_URL__|$EXPERT_HUB_API_URL|g" frontend/config.js
          else
            echo "EXPERT_HUB_API_URL secret is empty. Using default frontend/config.js value."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload frontend artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
