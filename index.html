<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Expert Hub</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configure Tailwind -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.3s ease-out forwards',
                        'scale-in': 'scaleIn 0.2s ease-out forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        scaleIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Custom scrollbar for chat area */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #4b5563;
        }

        .loading-dot {
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Glassmorphism utility */
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .dark .glass {
            background: rgba(17, 24, 39, 0.85);
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 h-[100dvh] flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="glass sticky top-0 z-10 border-b border-gray-200 dark:border-gray-800 px-4 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-bold shadow-lg">
                AI
            </div>
            <h1 class="text-lg font-bold text-gray-800 dark:text-white tracking-tight">Expert Hub</h1>
        </div>
        <!-- Theme toggle moved to bottom bar -->
    </header>

    <!-- Main Chat Area -->
    <main class="flex-grow flex flex-col relative max-w-5xl mx-auto w-full h-full overflow-hidden">
        
        <!-- Chat Messages -->
        <div id="chat-output" class="flex-grow overflow-y-auto custom-scrollbar p-4 space-y-6 pb-24">
            <!-- Welcome Message -->
            <div class="flex justify-start animate-fade-in-up">
                <div class="flex items-end space-x-2 max-w-[85%] sm:max-w-[70%]">
                    <div class="w-8 h-8 rounded-full bg-blue-100 dark:bg-blue-900 flex items-center justify-center text-lg flex-shrink-0">
                        🤖
                    </div>
                    <div class="p-4 rounded-2xl rounded-bl-none bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 shadow-sm text-gray-800 dark:text-gray-100">
                        <p class="font-medium text-sm text-blue-600 dark:text-blue-400 mb-1">System</p>
                        <p class="leading-relaxed">Hello! I'm your specialized AI consultant. Use the menus below to choose an expert or change the theme.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Floating Input Area -->
        <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-gray-50 via-gray-50 to-transparent dark:from-gray-900 dark:via-gray-900 pt-10">
            <div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700 p-2 transform transition-all focus-within:ring-2 ring-blue-500/20 relative">
                
                <!-- Controls Row -->
                <div class="flex gap-2 w-full mb-1">
                    
                    <!-- ROLE SELECTOR -->
                    <div class="relative flex-1 min-w-0">
                        <!-- The Drop-up List (Role) -->
                        <div id="role-menu" class="hidden absolute bottom-full left-0 mb-2 w-64 max-h-64 overflow-y-auto custom-scrollbar bg-white dark:bg-gray-800 rounded-xl shadow-2xl border border-gray-200 dark:border-gray-700 animate-scale-in origin-bottom-left z-20">
                            <div class="p-1" id="role-list-items">
                                <!-- Items injected by JS -->
                            </div>
                        </div>

                        <!-- Role Toggle Button -->
                        <button id="role-toggle-btn" class="flex items-center justify-between gap-2 px-3 py-2 text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors w-full border border-gray-100 dark:border-gray-700">
                            <div class="flex items-center gap-2 truncate">
                                <span id="current-role-emoji">📊</span>
                                <span id="current-role-name" class="truncate">Accountant</span>
                            </div>
                            <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>
                            </svg>
                        </button>
                    </div>

                    <!-- THEME SELECTOR -->
                    <div class="relative w-1/3 sm:w-auto sm:min-w-[140px]">
                        <!-- The Drop-up List (Theme) -->
                        <div id="theme-menu" class="hidden absolute bottom-full right-0 mb-2 w-40 bg-white dark:bg-gray-800 rounded-xl shadow-2xl border border-gray-200 dark:border-gray-700 animate-scale-in origin-bottom-right z-20">
                            <div class="p-1">
                                <button onclick="setTheme('light')" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-left">
                                    <span☀️</span> Light
                                </button>
                                <button onclick="setTheme('dark')" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-left">
                                    <span>🌙</span> Dark
                                </button>
                                <button onclick="setTheme('system')" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-left">
                                    <span>🖥️</span> System
                                </button>
                            </div>
                        </div>

                        <!-- Theme Toggle Button -->
                        <button id="theme-toggle-btn" class="flex items-center justify-between gap-2 px-3 py-2 text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors w-full border border-gray-100 dark:border-gray-700">
                            <div class="flex items-center gap-2 truncate">
                                <span id="current-theme-icon">🖥️</span>
                                <span id="current-theme-name" class="hidden sm:inline truncate">System</span>
                            </div>
                            <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>
                            </svg>
                        </button>
                    </div>

                </div>

                <!-- Input Field -->
                <div class="flex items-center gap-2 pl-2 border-t border-gray-100 dark:border-gray-700 pt-1">
                    <input type="text" id="user-input" placeholder="Type your message..." class="flex-grow bg-transparent border-none focus:ring-0 text-gray-800 dark:text-gray-100 placeholder-gray-400 h-10 text-base">
                    <button id="send-button" class="p-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-md hover:shadow-lg active:scale-95 flex-shrink-0">
                        <svg class="w-5 h-5 rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
            </div>
        </div>

    </main>

    <script>
        // ==========================================
        //  CONFIGURATION - PASTE API KEY BELOW
        // ==========================================
        const API_KEY = ".env"; // <--- PASTE YOUR GEMINI API KEY HERE
        
        // System Configuration
        const API_URL_BASE = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent";
        
        const roles = [
            { id: 'ca', name: 'Accountant', emoji: '📊', prompt: "Act as a highly professional Chartered Accountant and Financial Advisor. Be structured, factual, and cautious. Disclaimer: AI, not a substitute for licensed professionals." },
            { id: 'lawyer', name: 'Lawyer', emoji: '⚖️', prompt: "Act as a professional Legal Consultant. Explain concepts impartially. Disclaimer: AI, not legal counsel." },
            { id: 'relationship', name: 'Counselor', emoji: '💖', prompt: "Act as an empathetic Relationship Counselor. Warm, non-judgmental tone. Focus on communication and growth." },
            { id: 'doctor', name: 'Doctor', emoji: '🩺', prompt: "Act as a Medical Consultant. Explain medical concepts clearly. MANDATORY: Start with 'I am an AI, not a doctor. Consult a professional.'" },
            { id: 'business', name: 'Business', emoji: '💼', prompt: "Act as a Business Strategist. Insights on strategy, ops, and ROI. Professional terminology." },
            { id: 'developer', name: 'Developer', emoji: '💻', prompt: "Act as a Senior Software Engineer. Provide clean code, debugging help, and architectural advice." },
            { id: 'teacher', name: 'Teacher', emoji: '🍎', prompt: "Act as a patient Teacher. Use analogies, step-by-step explanations, and encourage curiosity." },
            { id: 'chef', name: 'Chef', emoji: '🍳', prompt: "Act as a professional Chef. Provide recipes, techniques, and food safety tips. Be enthusiastic." },
            { id: 'fitness', name: 'Trainer', emoji: '💪', prompt: "Act as a Personal Trainer. Workout routines and nutrition tips. Disclaimer: Consult physician first." }
        ];

        // State
        let currentRole = roles[0];
        let isRoleMenuOpen = false;
        let isThemeMenuOpen = false;
        
        // DOM Elements
        const chatOutput = document.getElementById('chat-output');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        
        // Role UI
        const roleToggleBtn = document.getElementById('role-toggle-btn');
        const roleMenu = document.getElementById('role-menu');
        const roleListItems = document.getElementById('role-list-items');
        const currentRoleName = document.getElementById('current-role-name');
        const currentRoleEmoji = document.getElementById('current-role-emoji');

        // Theme UI
        const themeToggleBtn = document.getElementById('theme-toggle-btn');
        const themeMenu = document.getElementById('theme-menu');
        const currentThemeIcon = document.getElementById('current-theme-icon');
        const currentThemeName = document.getElementById('current-theme-name');

        // --- Initialization ---
        
        function init() {
            renderRoleMenu();
            updateRoleDisplay();
            initTheme();
            userInput.focus();

            // Click outside to close menus
            document.addEventListener('click', (e) => {
                // Role Menu
                if (isRoleMenuOpen && !roleMenu.contains(e.target) && !roleToggleBtn.contains(e.target)) {
                    toggleRoleMenu(false);
                }
                // Theme Menu
                if (isThemeMenuOpen && !themeMenu.contains(e.target) && !themeToggleBtn.contains(e.target)) {
                    toggleThemeMenu(false);
                }
            });
        }

        // --- Theme Logic ---

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'system';
            setTheme(savedTheme, false); // false = don't toggle menu
        }

        function setTheme(theme, closeMenu = true) {
            localStorage.setItem('theme', theme);
            
            // Update Logic
            const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.classList.toggle('dark', isDark);

            // Update UI
            let icon = '🖥️';
            let name = 'System';
            if (theme === 'light') { icon = '☀️'; name = 'Light'; }
            if (theme === 'dark') { icon = '🌙'; name = 'Dark'; }
            
            currentThemeIcon.textContent = icon;
            currentThemeName.textContent = name;

            if (closeMenu) toggleThemeMenu(false);
        }

        function toggleThemeMenu(forceState) {
            isThemeMenuOpen = forceState !== undefined ? forceState : !isThemeMenuOpen;
            themeMenu.classList.toggle('hidden', !isThemeMenuOpen);
            // Close other menu
            if (isThemeMenuOpen) toggleRoleMenu(false);
        }

        themeToggleBtn.addEventListener('click', () => toggleThemeMenu());

        // --- Role Menu UI ---

        function toggleRoleMenu(forceState) {
            isRoleMenuOpen = forceState !== undefined ? forceState : !isRoleMenuOpen;
            roleMenu.classList.toggle('hidden', !isRoleMenuOpen);
            // Close other menu
            if (isRoleMenuOpen) toggleThemeMenu(false);
        }

        roleToggleBtn.addEventListener('click', () => toggleRoleMenu());

        function renderRoleMenu() {
            roleListItems.innerHTML = '';
            roles.forEach(role => {
                const btn = document.createElement('button');
                const isActive = role.id === currentRole.id;
                btn.className = `w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm transition-colors text-left ${
                    isActive 
                    ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 font-medium' 
                    : 'text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700'
                }`;
                btn.innerHTML = `
                    <span class="text-lg">${role.emoji}</span>
                    <span>${role.name}</span>
                    ${isActive ? '<svg class="w-4 h-4 ml-auto text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>' : ''}
                `;
                btn.onclick = () => {
                    setRole(role);
                    toggleRoleMenu(false);
                };
                roleListItems.appendChild(btn);
            });
        }

        function updateRoleDisplay() {
            currentRoleName.textContent = currentRole.name;
            currentRoleEmoji.textContent = currentRole.emoji;
        }

        function setRole(role) {
            currentRole = role;
            updateRoleDisplay();
            renderRoleMenu(); // Re-render to update checkmarks
            
            // System message
            const msgDiv = document.createElement('div');
            msgDiv.className = 'flex justify-center my-4';
            msgDiv.innerHTML = `<span class="text-xs font-medium text-gray-500 bg-gray-100 dark:bg-gray-800 px-3 py-1 rounded-full border border-gray-200 dark:border-gray-700 shadow-sm flex items-center gap-1">Switched to ${role.emoji} ${role.name}</span>`;
            chatOutput.appendChild(msgDiv);
            scrollToBottom();
        }

        // --- Chat Functions ---

        function scrollToBottom() {
            const chatContainer = document.getElementById('chat-output');
            setTimeout(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 10);
        }

        function appendUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'flex justify-end animate-fade-in-up';
            div.innerHTML = `
                <div class="max-w-[85%] sm:max-w-[70%] bg-blue-600 text-white rounded-2xl rounded-br-none px-4 py-3 shadow-md">
                    <p class="leading-relaxed whitespace-pre-wrap">${escapeHtml(text)}</p>
                </div>
            `;
            chatOutput.appendChild(div);
            scrollToBottom();
        }

        function appendAIMessage(text, sources = []) {
            const div = document.createElement('div');
            div.className = 'flex justify-start animate-fade-in-up';
            
            let formattedText = text
                .replace(/```([\s\S]*?)```/g, '<div class="my-2 bg-gray-900 rounded-lg p-3 overflow-x-auto custom-scrollbar"><code class="text-sm font-mono text-green-400">$1</code></div>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="text-blue-500 hover:underline">$1</a>')
                .replace(/\n/g, '<br>');

            let sourcesHtml = '';
            if (sources.length > 0) {
                const uniqueSources = [...new Map(sources.map(item => [item['uri'], item])).values()];
                sourcesHtml = `
                    <div class="mt-3 pt-3 border-t border-gray-200 dark:border-gray-700">
                        <p class="text-xs font-bold text-gray-500 mb-1">Sources:</p>
                        <ul class="space-y-1">
                            ${uniqueSources.map(s => `
                                <li>
                                    <a href="${s.uri}" target="_blank" class="flex items-center gap-1 text-xs text-blue-500 hover:underline truncate">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                                        ${s.title}
                                    </a>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            }

            div.innerHTML = `
                <div class="flex items-end space-x-2 max-w-[95%] sm:max-w-[80%]">
                    <div class="w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center text-lg flex-shrink-0 border border-gray-300 dark:border-gray-600">
                        ${currentRole.emoji}
                    </div>
                    <div class="p-4 rounded-2xl rounded-bl-none bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 shadow-sm text-gray-800 dark:text-gray-100 w-full overflow-hidden">
                        <p class="text-xs font-bold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wide">${currentRole.name}</p>
                        <div class="leading-relaxed text-sm sm:text-base">${formattedText}</div>
                        ${sourcesHtml}
                    </div>
                </div>
            `;
            chatOutput.appendChild(div);
            scrollToBottom();
        }

        function showLoading() {
            const div = document.createElement('div');
            div.id = 'loading-indicator';
            div.className = 'flex justify-start animate-pulse';
            div.innerHTML = `
                <div class="flex items-end space-x-2">
                    <div class="w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-700 flex-shrink-0"></div>
                    <div class="p-4 rounded-2xl rounded-bl-none bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 shadow-sm flex space-x-1">
                        <div class="w-2 h-2 bg-gray-400 rounded-full loading-dot"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full loading-dot"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full loading-dot"></div>
                    </div>
                </div>
            `;
            chatOutput.appendChild(div);
            scrollToBottom();
        }

        function removeLoading() {
            const el = document.getElementById('loading-indicator');
            if (el) el.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // --- API Logic ---

        async function fetchWithRetry(url, options, retries = 0) {
            const MAX_RETRIES = 3;
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response;
            } catch (error) {
                if (retries < MAX_RETRIES) {
                    await new Promise(r => setTimeout(r, 1000 * Math.pow(2, retries)));
                    return fetchWithRetry(url, options, retries + 1);
                }
                throw error;
            }
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;
            if (!API_KEY) {
                alert("Please add your API Key in the code (line ~168) to use this app.");
                return;
            }

            // UI Updates
            userInput.value = '';
            userInput.style.height = 'auto'; // Reset height
            sendButton.disabled = true;
            toggleRoleMenu(false); // Close menus
            toggleThemeMenu(false);
            
            appendUserMessage(text);
            showLoading();

            try {
                const payload = {
                    contents: [{ parts: [{ text: text }] }],
                    tools: [{ "google_search": {} }],
                    systemInstruction: { parts: [{ text: currentRole.prompt }] }
                };

                const response = await fetchWithRetry(`${API_URL_BASE}?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                removeLoading();

                if (data.candidates && data.candidates[0]) {
                    const aiText = data.candidates[0].content?.parts?.[0]?.text || "No response generated.";
                    
                    let sources = [];
                    const grounding = data.candidates[0].groundingMetadata;
                    if (grounding && grounding.groundingAttributions) {
                        sources = grounding.groundingAttributions
                            .map(attr => ({ uri: attr.web?.uri, title: attr.web?.title }))
                            .filter(s => s.uri && s.title);
                    }

                    appendAIMessage(aiText, sources);
                } else {
                    appendAIMessage("⚠️ Error: The AI did not return a valid response.");
                }

            } catch (error) {
                removeLoading();
                appendAIMessage(`⚠️ Connection Error: ${error.message}. Check your API Key and internet.`);
            } finally {
                sendButton.disabled = false;
                userInput.focus();
            }
        }

        // --- Event Listeners ---

        sendButton.addEventListener('click', handleSend);
        
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleSend();
            }
        });

        // Initialize App
        init();

    </script>
</body>
</html>
